name: Build

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history + tags so the Makefile's `git describe` works

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install libnx
        run: make -C lib/libnx install

      - name: Build and assemble release tree
        run: make all

      - name: Compute version (same logic as the Makefile)
        id: version
        run: |
          GIT_TAG=$(git describe --tags "$(git rev-list --tags --max-count=1)")
          COUNT=$(git rev-list "$(git rev-list --tags --no-walk --max-count=1)"..HEAD --count)
          VERSION="$GIT_TAG"
          [ "$COUNT" != "0" ] && VERSION="$GIT_TAG+$COUNT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sys-con-${{ steps.version.outputs.version }}
          path: out/
          if-no-files-found: error
